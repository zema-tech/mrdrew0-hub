<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR DREW0 — Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --void: #0a0505;
    --ember: #c81e1e;
    --bone: #e8ddd0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--void); color: var(--bone); font-family: 'Courier New', monospace; }

  .banner { width: 100%; display: block; border-bottom: 5px solid var(--ember); box-shadow: 0 10px 40px rgba(200,30,30,0.5); }

  .logo-container { text-align: center; margin: -80px auto 20px; position: relative; z-index: 10; }
  .logo { width: 170px; height: 170px; border-radius: 50%; border: 6px solid #ff2222; box-shadow: 0 0 45px #ff2222; }

  h1 { font-family: 'Press Start 2P', monospace; text-align: center; font-size: 2.8rem; text-shadow: 0 0 30px var(--ember); margin: 15px 0 8px; }
  .subtitle { text-align: center; color: #ccc; font-size: 1.15rem; margin-bottom: 40px; }

  .links-section {
    background: linear-gradient(rgba(10,5,5,0.9), rgba(10,5,5,0.95)), url('images/avatar.png') center/cover no-repeat;
    padding: 60px 20px;
    border-top: 4px solid var(--ember);
    border-bottom: 4px solid var(--ember);
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    color: var(--ember);
    text-align: center;
    margin-bottom: 30px;
    font-size: 1.25rem;
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .link-card {
    background: rgba(30,15,15,0.9);
    border: 2px solid var(--ember);
    padding: 16px;
    text-decoration: none;
    color: white;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: 0.3s;
  }
  .link-card:hover { transform: translateY(-5px); box-shadow: 0 0 25px rgba(200,30,30,0.6); }

  /* Altre sezioni mantengono lo stile del tuo vecchio sito */
</style>
</head>
<body>

  <!-- Nuovo Banner -->
  <img src="images/banner.png" alt="Mr Drew0 Banner" class="banner">

  <!-- Logo -->
  <div class="logo-container">
    <img src="images/avatar.png" alt="Mr Drew0" class="logo">
  </div>

  <h1>MR DREW0</h1>
  <p class="subtitle">Vanilla PvP, faide, alleanze e raid sui migliori server survival italiani</p>

  <!-- Canali -->
  <div class="links-section">
    <div class="section-title">CANALI UFFICIALI</div>
    <div class="links-grid">
      <a class="link-card" href="https://youtube.com/@secretmrdrew" target="_blank">YouTube Principale — @secretmrdrew</a>
      <a class="link-card" href="https://youtube.com/@mr_drew0" target="_blank">YouTube Secondario — @mr_drew0</a>
      <a class="link-card" href="https://twitch.tv/mr_drew0" target="_blank">Twitch — mr_drew0</a>
      <a class="link-card" href="https://discord.com/invite/7sGrEC4ez2" target="_blank">Discord Community</a>
      <a class="link-card" href="https://tiktok.com/@mr_drew03" target="_blank">TikTok — @mr_drew03</a>
      <a class="link-card" href="https://instagram.com/mr_drew0" target="_blank">Instagram — @mr_drew0</a>
    </div>
  </div>

  <!-- Puoi aggiungere qui sotto le altre sezioni (Server, Galleria, Video, Candidature, Donazioni) copiandole dal tuo vecchio file se vuoi -->

  <footer style="text-align:center; padding:40px; color:#666; font-size:0.9rem;">
    © Mr Drew0 — mr.drew0.contatto@gmail.com
  </footer>

</body>
</html>
