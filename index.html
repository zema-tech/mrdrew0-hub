<html lang="it">
<head>
<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --void: #0a0505;
    --void-deep: #050303;
    --ember: #c81e1e;
    --ember-bright: #ff2f2f;
    --ember-glow: #ff4d4d;
    --stone: #1c1614;
    --stone-light: #2a221f;
    --bone: #e8ddd0;
    --bone-dim: #a89a8c;
    --nether-purple: #6b2fb3;
    --bronze: #cd7f32;
    --silver: #c0c0c8;
    --gold: #ffd24d;
    --green: #4dff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--bone);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.75;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 2px, transparent 32px, rgba(255,255,255,0.015) 34px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, transparent 2px, transparent 32px, rgba(255,255,255,0.015) 34px);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px 64px;
  }

  .banner-wrap {
    width: 100%;
    overflow: hidden;
    border-bottom: 3px solid var(--ember);
    box-shadow: 0 4px 30px rgba(255,45,45,0.25);
    position: relative;
    z-index: 3;
  }

  .banner-wrap img {
    width: 100%;
    display: block;
    object-fit: cover;
    max-height: 260px;
  }

  .login-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(10,5,5,0.75);
    border: 2px solid var(--ember-bright);
    color: var(--bone);
    padding: 8px 14px;
    font-size: 11px;
    font-weight: bold;
    text-decoration: none;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
    transition: all 0.15s ease;
    cursor: pointer;
  }

  .login-btn:hover { background: rgba(200,30,30,0.35); transform: translateY(-2px); }

  .hero {
    text-align: center;
    margin: 32px 0 48px;
    position: relative;
    z-index: 3;
  }

  .hero-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(26px, 8vw, 46px);
    line-height: 1.3;
    color: var(--bone);
    text-shadow: 0 0 2px var(--ember-bright), 0 0 12px var(--ember), 0 0 28px rgba(255,45,45,0.6), 3px 3px 0 var(--void-deep);
    letter-spacing: 2px;
  }

  .hero-sub {
    margin-top: 16px;
    font-size: 13px;
    color: var(--bone-dim);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .section-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--ember-glow);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  section { margin-bottom: 48px; position: relative; z-index: 3; }

  /* Altri stili (links, cards, ecc.) mantenuti dal commit precedente */
  .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .link-card, .server-card, .video-card, .role-card, .tier-card, .playlist-card {
    position: relative; z-index: 3;
  }

  /* MODAL (mantenuto migliorato) */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    width: 100%; max-width: 360px; background: linear-gradient(180deg, var(--stone), var(--void-deep));
    border: 3px solid var(--ember); box-shadow: 0 0 50px rgba(255,45,45,0.5);
    padding: 32px 28px; position: relative; z-index: 1001;
    animation: modalPop 0.3s ease;
  }

  @keyframes modalPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ... resto del CSS del modal ... */
</style>

<script>
  // Particle System (funzionante)
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height * 0.7;
      this.size = Math.random() * 3 + 1;
      this.speed = Math.random() * 1.8 + 0.6;
      this.opacity = Math.random() * 0.7 + 0.4;
      this.hue = Math.random() > 0.6 ? 8 : 275;
      this.life = 250 + Math.random() * 250;
    }
    update() {
      this.y += this.speed;
      this.life--;
      this.opacity = Math.max(0, this.life / 300);
      if (this.life <= 0 || this.y > canvas.height) this.reset();
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsl(${this.hue}, 100%, 80%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < 110; i++) particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      p.update();
      p.draw();
    }
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  initParticles();
  animate();

  console.log('%c✅ Particelle ember ripristinate e sito fixato!', 'color:#ff2f2f;font-size:14px');
</script>

</body>
