<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bannerGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="50" r="30" fill="#ff2f2f" opacity="0.3"/>
  <circle cx="1100" cy="250" r="40" fill="#ff2f2f" opacity="0.2"/>
  <rect x="150" y="20" width="60" height="60" fill="#ff4d4d" opacity="0.2"/>
  <rect x="1000" y="220" width="80" height="80" fill="#ff4d4d" opacity="0.15"/>
  
  <!-- Title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#e8ddd0" letter-spacing="5">MR DREW0</text>
  
  <!-- Glow effect -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="none" stroke="#ff2f2f" stroke-width="3" opacity="0.6" letter-spacing="5">MR DREW0</text>
  
  <!-- Subtitle -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#e8ddd0" opacity="0.9" letter-spacing="2">Vanilla PvP • Faide • Alleanze • Raid</text>
</svg>