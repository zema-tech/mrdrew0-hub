<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="avatarGrad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ff2f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c81e1e;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="140" fill="url(#avatarGrad)" filter="url(#glow)"/>
  
  <!-- Inner circle -->
  <circle cx="150" cy="150" r="120" fill="#0a0505"/>
  
  <!-- Head -->
  <circle cx="150" cy="110" r="45" fill="#e8ddd0"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="100" r="8" fill="#c81e1e"/>
  <circle cx="165" cy="100" r="8" fill="#c81e1e"/>
  <circle cx="136" cy="99" r="3" fill="#000"/>
  <circle cx="166" cy="99" r="3" fill="#000"/>
  
  <!-- Mouth -->
  <path d="M 140 125 Q 150 135 160 125" stroke="#c81e1e" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="120" y="160" width="60" height="70" fill="#e8ddd0" rx="5"/>
  
  <!-- Armor details -->
  <rect x="115" y="155" width="70" height="5" fill="#ff2f2f" opacity="0.6"/>
  <rect x="115" y="235" width="70" height="5" fill="#ff2f2f" opacity="0.6"/>
  
  <!-- Decorative glow circles -->
  <circle cx="80" cy="150" r="8" fill="#ff2f2f" opacity="0.4"/>
  <circle cx="220" cy="150" r="8" fill="#ff2f2f" opacity="0.4"/>
  <circle cx="150" cy="50" r="6" fill="#ff4d4d" opacity="0.5"/>
  <circle cx="150" cy="250" r="6" fill="#ff4d4d" opacity="0.5"/>
</svg>